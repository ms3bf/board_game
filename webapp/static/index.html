<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>デモトレ</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-top">
          <div class="brand-block">
            <p class="brand-label">デモトレ</p>
          </div>
        </div>

        <section class="quote-strip">
          <div class="quote-main">
            <div class="quote-price-row">
              <strong id="headline-cash" class="quote-price">-</strong>
              <span class="quote-delta">JPY</span>
              <span class="live-pill">LIVE</span>
            </div>
            <div class="quote-meta-row">
              <span id="meta-time">--:--:--</span>
            </div>
          </div>
        </section>
        <div class="hidden-metrics" aria-hidden="true">
          <span id="best-ask">-</span>
          <span id="best-bid">-</span>
          <span id="speed-label">LIVE</span>
        </div>

        <nav class="section-tabs">
          <button id="show-board" class="section-tab active" type="button">板</button>
          <button id="show-chart" class="section-tab" type="button">チャート</button>
          <button id="show-trades" class="section-tab" type="button">歩み値</button>
        </nav>
      </header>

      <main class="app-main">
        <section id="error-banner" class="error-banner hidden"></section>

        <section class="viewport-shell">
          <div id="section-viewport" class="section-viewport">
            <div id="section-track" class="section-track">
              <section id="board-panel" class="view-panel">
                <div class="board-head">
                  <div class="board-mode">24H Live Board</div>
                  <div class="board-mode-side">現在時刻以下の最新状態を表示</div>
                </div>
                <div class="board-wrap">
                  <table class="board-table">
                    <colgroup>
                      <col class="col-order">
                      <col class="col-qty">
                      <col class="col-price">
                      <col class="col-qty">
                      <col class="col-order">
                    </colgroup>
                    <thead>
                      <tr>
                        <th>売り数量</th>
                        <th>売注文</th>
                        <th>価格</th>
                        <th>買注文</th>
                        <th>買い数量</th>
                      </tr>
                    </thead>
                    <tbody id="board-body"></tbody>
                  </table>
                </div>
              </section>

              <section id="chart-panel" class="view-panel">
                <div class="chart-toolbar">
                  <div class="chart-mode-group">
                    <button id="chart-line" class="chip-button chart-chip active" type="button">通常</button>
                    <button id="tf-1m" class="chip-button chart-chip active" type="button">1分足</button>
                    <button id="tf-5m" class="chip-button chart-chip" type="button">5分足</button>
                  </div>
                  <div class="chart-mode-group">
                    <button id="zoom-out" class="chip-button chart-chip" type="button">-</button>
                    <button id="zoom-in" class="chip-button chart-chip" type="button">+</button>
                  </div>
                </div>
                <canvas id="chart-canvas" width="1000" height="560"></canvas>
              </section>

              <section id="trades-panel" class="view-panel">
                <div class="table-wrap trades-wrap">
                  <table class="data-table">
                    <thead>
                      <tr>
                        <th>Time</th>
                        <th>Price</th>
                        <th>Size</th>
                        <th>Side</th>
                      </tr>
                    </thead>
                    <tbody id="trades-body"></tbody>
                  </table>
                </div>
              </section>
            </div>
          </div>
        </section>

        <section id="trading-panel" class="trading-sheet">
          <div class="sheet-head">
            <strong>取引</strong>
            <div class="sheet-actions">
              <button id="cancel-orders-btn" class="chip-button" type="button">注文取消</button>
            </div>
          </div>

          <div class="summary-grid">
            <div class="summary-card"><span>現金</span><strong id="sum-cash">-</strong></div>
            <div class="summary-card"><span>建玉</span><strong id="sum-pos">-</strong></div>
            <div class="summary-card"><span>平均</span><strong id="sum-avg">-</strong></div>
            <div class="summary-card"><span>実現損益</span><strong id="sum-real">-</strong></div>
            <div class="summary-card"><span>含み損益</span><strong id="sum-unreal">-</strong></div>
            <div class="summary-card"><span>評価額</span><strong id="sum-equity">-</strong></div>
          </div>

          <details class="sheet-details">
            <summary>注文一覧</summary>
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>売買</th>
                    <th>指値</th>
                    <th>時刻</th>
                  </tr>
                </thead>
                <tbody id="pending-body"></tbody>
              </table>
            </div>
          </details>

          <details class="sheet-details">
            <summary>取引履歴</summary>
            <div class="table-wrap">
              <table class="data-table dense">
                <thead>
                  <tr>
                    <th>時刻</th>
                    <th>種別</th>
                    <th>売買</th>
                    <th>価格</th>
                    <th>数量</th>
                    <th>理由</th>
                    <th>建玉</th>
                    <th>平均</th>
                    <th>差額</th>
                    <th>累計</th>
                  </tr>
                </thead>
                <tbody id="log-body"></tbody>
              </table>
            </div>
          </details>
        </section>

        <section class="empty-state hidden" id="empty-state">
          <h2>No parquet found</h2>
          <p>24時間板の parquet をこのディレクトリに置くと自動で候補に出ます。</p>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
